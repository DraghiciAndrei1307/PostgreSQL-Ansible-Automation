# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- PERFORM FULL BACKUP ------------------------------- #
# -------------------------------------------------------------------------------------------- #

---
- name: "Perform full backup for all slaves"
  hosts: slaves
  become: yes
  become_user: postgres
  vars_files:
    - group_vars/vault.yml
  tasks:
    - name: "Perform full backup"
      ansible.builtin.import_role:
        name: pgbackrest_actions
        tasks_from: full_backup

