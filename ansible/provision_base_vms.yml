# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- CREATE NEW VM ------------------------------------- #
# -------------------------------------------------------------------------------------------- #
---

- name: "Create pass variable"
  hosts: localhost
  gather_facts: no
  vars_files:
    - group_vars/vault.yml
  tasks:
    - name: "Get the variable needed in the template"
      ansible.builtin.set_fact:
        ansible_become_password_local: "{{ lookup('ansible.builtin.env', 'VAULT_PASSWORD') }}"

- name: "Check Base VMS"
  hosts: hypervisor
  gather_facts: no
  vars:
    ansible_become_password: "{{ hostvars['localhost']['ansible_become_password_local'] }}"
  tasks:
    - name: "Check Base VMs"
      ansible.builtin.import_role:
        name: host_hypervisor_management
        tasks_from: check_base_vms


# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- UPDATE  INV --------------------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Add Base VMs to a specific inventory"
  hosts: localhost
  gather_facts: no
  become: yes
  vars_files:
    - group_vars/vault.yml
  tasks:
    - name: "Add the Base VM to inventory"
      vars:
        formatted_mac_address: "{{ hostvars['hypervisor'][item ~ '_formatted_mac_address'] }}"
        inventory_name: "base_nodes_inventory"
        vm_name: "{{ item }}"
        dinamic_group_name: base_vms_group
        static_group_name: base_vms_group
      ansible.builtin.include_role:
        name: host_hypervisor_management
        tasks_from: add_vm_to_inventory
      loop: "{{ hostvars['hypervisor'].base_vm_names }}"



# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- COPY SSH KEY M > S -------------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Copy the public SSH key from master to the new slave"
  hosts:
#    - new_slaves
    - base_vms_group
  gather_facts: no
  become: yes
  vars_files:
    - group_vars/vault.yml
  tasks:
    - name: "Copy key"
      ansible.builtin.import_role:
        name: host_hypervisor_management
        tasks_from: copy_ssh_key

# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- CONFIGURE STORAGE --------------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Configure the Storage"
  hosts: base_vms_group
  become: yes
  gather_facts: true
  vars_files:
    - group_vars/vault.yml
  vars:
    - pg_version: 14
  tasks:
    - name: Storage Auto-Detect
      ansible.builtin.import_role:
        name: storage_management
        tasks_from: storage_device_auto_detect

# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- POSTGRESQL CONFIG --------------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Install and Configure PostgreSQL"
  hosts: base_vms_group
  become: yes
  vars_files:
    - group_vars/vault.yml
  vars:
    - pg_version: 14
  roles:
    - common # run all the tasks from common/tasks/main.yml
    - postgresql_config_and_install

# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- BUILD PGBACKREST ---------------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Build and Compile pgBackRest"
  hosts: localhost
  become: yes
  vars_files:
      - group_vars/vault.yml
  vars:
    dependencies:
      - meson
      - gcc
      - postgresql14-devel
      - openssl-devel
      - libxml2-devel
      - lz4-devel
      - libzstd-devel
      - bzip2-devel
      - libyaml-devel
      - libssh2-devel
    pg_version: 14
  roles:
    - pgbackrest_build

# -------------------------------------------------------------------------------------------- #
# ---------------------------------------- DISTRIBUTE PGBACKREST ----------------------------- #
# -------------------------------------------------------------------------------------------- #

- name: "Copy the compiled file to the slave nodes"
  hosts: base_vms_group
  become: yes
  vars_files:
    - group_vars/vault.yml
  vars:
    - pg_version: 14
  roles:
    - pgbackrest_config_and_install
    - pgbackrest_quick_start

