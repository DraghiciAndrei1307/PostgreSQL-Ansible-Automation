# ---------------- INSTALL POSTGRESQL ------------------------- #

- name: "Install PostgreSQL version {{ pg_version }}"
  ansible.builtin.dnf:
    name: postgresql{{ pg_version }}-server
    state: present

# ------------------------------------------------------------- #

# ---------------- CONFIGURE PGDATA --------------------------- #

- name: Ensure /opt is accessible
  ansible.builtin.file:
    path: /opt
    mode: '0755'

- name: Ensure /opt/postgresql is accessible
  ansible.builtin.file:
    path: /opt/postgresql
    mode: '0755'

- name: Ensure ownership recursively
  ansible.builtin.file:
    path: /opt/postgresql
    owner: postgres
    group: postgres
    recurse: yes

- name: Set Strict permissions on PGDATA
  ansible.builtin.file:
    path: /opt/postgresql/data
    mode: '0700'

# ------------------------------------------------------------- #

# ---------------- INITIALIZE DATABASE ------------------------ #

- name: "Initialize the database"
  ansible.builtin.command: "/usr/pgsql-{{ pg_version }}/bin/initdb -D /opt/postgresql/data"
  args:
    creates: /opt/postgresql/data/PG_VERSION
  become: true
  become_user: postgres

# ------------------------------------------------------------- #

# ---------------- CREATE POSTGRESQL service.d FOLDER --------- #

- name: "Create postgresql-14.service.d folder"
  ansible.builtin.file:
    path: /etc/systemd/system/postgresql-{{ pg_version }}.service.d
    state: directory

# ------------------------------------------------------------- #

# ---------------- UPDATE THE POSTGRESQL SERVICE CONF --------- #

# This operation will require to update the selinux context

- name: "Update the postgresql-{{ pg_version }} service conf"
  ansible.builtin.template:
    src: postgresql-service.conf.j2
    dest: /etc/systemd/system/postgresql-{{ pg_version }}.service.d/postgresql-service.conf

# ------------------------------------------------------------- #

# ----------- APPLY SAME SELINUX CONTEXT TO THE NEW PGDATA ---- #

- name: "Set SELINUX on enforcing mode"
  ansible.posix.selinux:
    policy: targeted
    state: enforcing

- name: "Apply same context to the new data location"
  ansible.builtin.shell: | 
    semanage fcontext -a -t postgresql_db_t "/opt/postgresql(/.*)?"
    restorecon -Rv /opt/postgresql

# ------------------------------------------------------------- #

# ------------ CREATE NEW LOG FOLDER -------------------------- #

- name: "Create /opt/postgresql/logs/pg_log folder"
  ansible.builtin.file:
    path: /opt/postgresql/logs/pg_logs
    state: directory
    owner: postgres
    group: postgres
    mode: '0700'

- name: "Rsync old log folder into the new one"
  ansible.builtin.command: rsync -av /opt/postgresql/data/log /opt/postgresql/logs/pg_logs

# ----------- UPLOAD postgresql.conf FILE --------------------- #

- name: "Upload postgresql.conf config file from template"
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: /opt/postgresql/data/postgresql.conf
    owner: postgres
    group: postgres
    mode: '0644'

# ------------------------------------------------------------- #

# ----------- ENABLE AUTOMATIC START -------------------------- #

- name: "Enable automatic start"
  ansible.builtin.service:
    name: postgresql-{{ pg_version }}
    enabled: yes

# ------------------------------------------------------------- #

# ----------- START POSTGRESQL SERVICE ------------------------ #

- name: "Start the PostgreSQL service"
  ansible.builtin.service:
    name: postgresql-{{ pg_version }}
    state: started

# ------------------------------------------------------------- #




