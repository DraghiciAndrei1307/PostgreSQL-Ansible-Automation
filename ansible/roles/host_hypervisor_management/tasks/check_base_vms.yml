- name: "Check for the base VMs"
  ansible.builtin.win_command: vboxmanage list vms
  register: vms_list

- name: "Debug the 'vms_list' variable"
  ansible.builtin.debug:
    var: vms_list

- name: "Search for the bronze-base VMs"
  ansible.builtin.set_fact:
    bronze_base: "{{ (result[0] | split('"'))[0] }}"
  vars:
    search_string: "bronze-base"
    result: "{{ vms_list.stdout_lines | select('search', search_string) | list}}"

- name: "Debug the 'bronze_base' variable"
  ansible.builtin.debug:
    var: bronze_base

