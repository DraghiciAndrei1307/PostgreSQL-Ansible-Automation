- name: "List the virtual machines on the Hypervisor Host"
  ansible.builtin.command: vboxmanage list vms
  register: vms_list

- name: "Debug the 'vms_list' variable"
  ansible.builtin.debug:
    var: vms_list

- name: "Create a new VM using a designated base"
  ansible.builtin.shell: "vboxmanage clonevm RedHat-Base --name RedHat-Test --basefolder=D:\VMs\RedHat-Test --register"
  register: clonevm_output

- name: "Debug the 'clonevm_output' variable"
  ansible.builtin.debug:
    var: clonevm_output