# ------------------ GET INFO --------------------------------- #

- name: "Get info of the newly created VM"
  ansible.builtin.win_command: >
    vboxmanage showvminfo {{ vm_name }}
  register: showvminfo_output

- name: "Debug the 'showvminfo_output' variable"
  ansible.builtin.debug:
    var: showvminfo_output

# ------------------------------------------------------------- #

# ------------------ GET MAC ---------------------------------- #

- name: "Get the MAC address"
  ansible.builtin.set_fact:
    mac_address: "{{ (((showvminfo_output.stdout_lines | select('search', 'MAC') | list)[1] | split(': '))[2] | split(','))[0] }}"

- name: "Debug the 'mac_address' variable"
  ansible.builtin.debug:
    var: mac_address

# ------------------------------------------------------------- #

# ------------------ FORMAT MAC ------------------------------- #

- name: "Format the MAC address"
  ansible.builtin.set_fact:
    "{{ vm_name }}_formatted_mac_address": "{{ mac_address | regex_replace('([0-9A-Fa-f]{2})(?!$)', '\\1:') | lower }}"

- name: "Debug the '{{ vm_name }}_formatted_mac_address' variable"
  ansible.builtin.debug:
    var: "{{ vm_name }}_formatted_mac_address"

# ------------------------------------------------------------- #
