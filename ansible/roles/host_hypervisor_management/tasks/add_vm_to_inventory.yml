# In order to detect the newly created VM, you need to install arp-scan
# The arp-scan cen be downloaded from the EPEL repo...

# REFERENCES for the actions below:
# https://oneuptime.com/blog/post/2026-03-04-how-to-enable-the-epel-repository-on-rhel-9/view

# You need to:
# - register the master node:
# sudo subscription-manager register --force
# sudo subscription-manager attach --auto

# - enable the codeready-builder:
# sudo subscription-manager repos --enable=codeready-builder-for-rhel-9-x86_64-rpms

# - install EPEL:
# sudo dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm

# - install the arp-scan:
# sudo dnf install arp-scan -y

- name: "Get IPs on the localhost"
  ansible.builtin.command: arp-scan -l
  register: arp_scan_output
  until: arp_scan_output.stdout | regex_search(formatted_mac_address)
  retries: 30
  delay: 10
  changed_when: false

- name: "Debug the 'arp_scan_output' variable"
  ansible.builtin.debug:
    var: arp_scan_output

- name: "Which MAC I am looking for?"
  ansible.builtin.debug:
    msg: "I want to find the MAC {{ formatted_mac_address }} for the {{ vm_name }} VM."

- name: "Get lines which contain the MAC address"
  ansible.builtin.set_fact:
    matched_arp_lines: "{{ arp_scan_output.stdout_lines | select('search', formatted_mac_address) | list }}"

- name: "Debug the 'matched_arp_lines' variable"
  ansible.builtin.debug:
    var: matched_arp_lines

- name: "Stop the execution if the VM does not have an IP address"
  ansible.builtin.fail:
    msg: "MAC address {{ formatted_mac_address }} not found! Check if the VM {{ vm_name }} started and has an IP assigned."
  when: (formatted_mac_address | lower) not in (matched_arp_lines | join(' ') | lower)

- name: "Get the IP address"
  ansible.builtin.set_fact:
    new_vm_ip_address: "{{ (matched_arp_lines | first | split('\t'))[0] }}"

- name: "Debug the 'new_vm_ip_address' variable"
  ansible.builtin.debug:
    var: new_vm_ip_address

- name: "Check if the inventory exists"
  ansible.builtin.stat:
    path: "./inventories/{{ inventory_name }}"
  register: inventory_file_status

- name: "Debug the 'inventory_file_status' variable"
  ansible.builtin.debug:
    var: inventory_file_status

- name: "Create the './inventories/{{ inventory_name }}' path if does not exist"
  when:
    - inventory_file_status is defined
    - not inventory_file_status.stat.exists
  block:
    - name: "Create the './inventories' folder if does not exist"
      ansible.builtin.file:
        path: ./inventories
        state: directory
        owner: student
        group: student
        mode: '0755'

    - name: "Create the './inventories/{{ inventory_name }}' file if does not exist"
      ansible.builtin.file:
        path: "./inventories/{{ inventory_name }}"
        state: touch
        owner: student
        group: student
        mode: '0644'

    - name: "Add the first line inside './inventories/{{ inventory_name }}' file"
      ansible.builtin.lineinfile:
        path: "./inventories/{{ inventory_name }}"
        line: "[{{ static_group_name }}]"

- name: "Add the new ip address to the inventory"
  ansible.builtin.lineinfile:
    path: "./inventories/{{ inventory_name }}"
    line: "{{ vm_name }} ansible_host={{ new_vm_ip_address }}"

- name: "Add the new VM dynamically (runtime inventory)"
  ansible.builtin.add_host:
    name: "{{ vm_name }}"
    groups: "{{ dinamic_group_name }}"
    ansible_host: "{{ new_vm_ip_address }}"
    ansible_user: student
