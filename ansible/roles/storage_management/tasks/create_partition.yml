
# Need to configure the creation of multiple partitions


- name: Create_New_XFS_Primary_Partition
  community.general.parted:
    device: /dev/{{ item }}
    number: 1
    flags: [lvm]
    state: present
    fs_type: xfs
  register: create_partition_output
  loop: "{{ disks }}"

