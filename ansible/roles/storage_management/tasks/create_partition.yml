- name: Output partition number task
  ansible.builtin.debug:
    var: create_partition_output['results'][0]['partitions'][0]['num']

- name: Output disk where partition was created
  ansible.builtin.debug:
    var: create_partition_output['results'][0]['disk']['dev']

- name: Output the recently created partition
  ansible.builtin.debug:
    msg: "{{ create_partition_output['results'][0]['disk']['dev'] }}{{ create_partition_output['results'][0]['partitions'][0]['num'] }}"

- name: Create a fact that contains the newly created partition name
  ansible.builtin.set_fact:
    new_partition: "{{ create_partition_output['results'][0]['disk']['dev'] }}{{ create_partition_output['results'][0]['partitions'][0]['num'] }}"
