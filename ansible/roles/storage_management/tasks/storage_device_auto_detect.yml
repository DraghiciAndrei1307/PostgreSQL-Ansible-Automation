# needed checks:
# if LV exists
# if already formatted
# if already mounted


- name: Create XFS file systems on the LVMs
  ansible.builtin.command: "mkfs.xfs /dev/vg_postgres/{{ item }}"
  loop: '{{ postgresql_lvms }}'
  when: empty_disks is defined and empty_disks | length > 0

# ----------------------------------------------------------- #

- name: Create PostgreSQL dir list
  ansible.builtin.set_fact:
    postgresql_dirs:
      - /opt/postgresql/data
      - /opt/postgresql/wal
      - /opt/postgresql/logs
      - /opt/postgresql/backups

- name: Create PostgreSQL directories if it does not exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop: '{{ postgresql_dirs }}'

- name: Mount LVM filesystems
  ansible.posix.mount:
    path: "{{ item.1 }}"
    src: "/dev/vg_postgres/{{ item.0 }}"
    fstype: xfs
    state: mounted
  loop: "{{ postgresql_lvms | zip(postgresql_dirs) | list }}"

# We will remove or repurpose the following tasks in the future
# Their only purpose is to help speed up the development process

# The 'Remove the Physical Volume' task aims to remove the physical volume
# we created above. The thing is that if we create a PV and then we delete
# the XFS partition, the PV will remain orphan on the disk. IF we do not
# remove the PV, this can result in: pvs shows “stale” devices, LVM warnings,
# slow scans or errors, confusion when re-using disk

# -------------------- UNMOUNT THE LVMS --------------------- #

# Before you unmount and remove the LVMs, make sure you
# save (if needed) the data contained by the file system you
# want to delete.

#umount /opt/postgresql/data



- name: Unmount filesystems
  ansible.posix.mount:
    path: "{{ item }}"
    state: unmounted
  loop: "{{ postgresql_dirs }}"
  when:
    - empty_disks is defined
    - empty_disks | length == 0

# ----------------------------------------------------------- #

# -------------------- REMOVE THE LVMS ---------------------- #

- name: Sync
  ansible.builtin.command: sync

# lvremove the lvms

#lvremove /dev/main/lvol0

- name: Remove Logical Volumes
  community.general.lvol:
    vg: vg_postgres
    lv: "{{ item }}"
    state: absent
    force: true
  loop: "{{ postgresql_lvms }}"
  when:
    - empty_disks is defined
    - empty_disks | length == 0

# ----------------------------------------------------------- #

# -------------------- CHECK VOLUME GROUPS --------------- #

- name: Check Volume Groups
  ansible.builtin.command: vgs
  register: vgs_output

# ----------------------------------------------------------- #

# -------------------- REMOVE VOLUME GROUP --------------- #

# This task will be later updated...we use it at the moment
# to speed up the development process.

- name: Remove 'vg_postgres' Volume Group (VG)
  ansible.builtin.command: vgremove vg_postgres
  when:
    - empty_disks is defined
    - empty_disks | length == 0
    - "'vg_postgres' in vgs_output.stdout"

# ----------------------------------------------------------- #

# -------------------- CHECK PHYSICAL VOLUMES --------------- #

- name: Check the Physical Volumes
  ansible.builtin.command: pvs
  register: pvs_output

- name: Debug pvs_output variable
  ansible.builtin.debug:
    var: pvs_output["stdout"]

# ----------------------------------------------------------- #

# -------------------- REMOVE PHYSICAL VOLUMES -------------- #

# The condition is not perfect, but we will work on that later.

- name: Remove the Physical Volume (if exists)
  ansible.builtin.command: 'pvremove /dev/{{ item }}'
  loop:
    - sdb1
    - sdb2
    - sdc1
    - sdc2
  when:
    - empty_disks is defined
    - empty_disks | length == 0
    - "'/dev/sdb1' in pvs_output.stdout"

# ----------------------------------------------------------- #

# -------------------- DELETE PARTITIONS -------------------- #

- name: Delete XFS partitions
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: delete_partitions
  vars:
    disk: '/dev/{{ item }}'
  loop:
    - sdb
    - sdc
  when: empty_disks is defined and empty_disks | length == 0

