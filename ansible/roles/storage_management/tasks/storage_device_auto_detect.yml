
# -------------------- CHECK THE STORAGE DEVICES ------------- #

# DESCRIPTION:
# We are checking the facts that the target contains regarding
# the available storage devices.

- name: Check the storage devices
  ansible.builtin.debug:
    var: ansible_facts.devices

# ------------------------------------------------------------ #

# -------------------- CREATE LIST OF EMPTY DISKS ------------ #

# DESCRIPTION:
# We are using set_fact module to create the empty_disks list.

- name: Create empty_disks list
  ansible.builtin.set_fact:
    empty_disks: >- 
      {{ 
        ansible_facts.devices 
        | dict2items
        | selectattr('value.partitions', 'equalto', {}) 
        | selectattr('value.model', 'equalto', "VBOX HARDDISK")
        | map(attribute='key')
        | list 
      }}

# ------------------------------------------------------------ #

# -------------------- CHECK LIST OF EMPTY DISKS ------------- #

# DESCRIPTION:
# We are using debug module to list the contents of the
# 'empty_disks' list.

- name: List the empty_disks list
  ansible.builtin.debug:
    var: empty_disks

# ------------------------------------------------------------ #

# -------------------- CREATE XFS PARTITIONS FOR EACH DISK---- #

# DESCRIPTION:
# We are using import_role module to use the create_partition
# task of the storage_management role.

- name: Create XFS partitions
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: create_partitions
  vars:
    number_of_partitions_per_disk: 2
    disk_name: "{{ item }}"
    disk_size: "{{ ansible_facts.devices[item].size }}"
  loop: "{{ empty_disks }}"
  when: empty_disks is defined and empty_disks | length > 0

# ------------------------------------------------------------ #

# We will have to update the new_partition with a list of newly_created partitions

# -------------------- CHECK THE NEW PARTITION --------------- #

# DESCRIPTION:
# The variable new_partition is a variable resulted from the
# create_partition task file execution.

- name: Output New XFS Partitions Names
  ansible.builtin.debug:
    var: partitions_created
  when:
    - partitions_created is defined
    - partitions_created | length > 0

# ------------------------------------------------------------ #

# -------------------- CREATE PHYSICAL VOLUMES ---------------- #

# DESCRIPTION:
# Related to the description above, the usage of the import_role
# here will not grant us the access to the new_partition variable.
# It is good that we already created another variable named
# 'new_partition_name', based on 'new_partition'.

# In this task, we are creating a Physical Volume (PV) based on
# the newly created partition. Check the 'create_physical_volume'
# task file of the current role (storage_management).

- name: Create Physical Volumes (PV)
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: create_physical_volume
  vars:
    partition: "{{ item }}"
  loop: "{{ partitions_created }}"
  when:
    - partitions_created is defined
    - partitions_created | length > 0

# ----------------------------------------------------------- #

# -------------------- CONFIGURE VOLUME GROUP --------------- #

- name: Debug 'create_pvs_status' fact
  ansible.builtin.debug:
    var: create_pvs_status
  when:
    - create_pvs_status is defined

- name: Configure Volume Group
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: configure_volume_group
  vars:
    physical_volume: '{{ partitions_created }}'
    vg_name: vg_postgres
  when:
    - create_pvs_status is defined
    - create_pvs_status | selectattr('failed', 'equalto', true) | list | length == 0

# ----------------------------------------------------------- #

# -------------------- CREATE LOGICAL VOLUMES --------------- #

# DESCRIPTION:
# Calculate the space needed for each LVM:
# 4 PostgreSQL LVMs and 4 LVMs for snapshots
# VG space / 8 = space for 1 LVM

- name: Get the output of the vgdisplay
  ansible.builtin.command: vgdisplay vg_postgres
  register: vgdisplay_output

#- name: Debug 'vgdisplay_output' variable output
#  ansible.builtin.debug:
#    var: vgdisplay_output

- name: Set fact that contains Total PE
  ansible.builtin.set_fact:
    total_PE: '{{ (result[0] | split)[2] }}'
  vars:
    search_string: 'Total PE'
    result: "{{ vgdisplay_output.stdout_lines | select('search', search_string) | list }}"
  when: vgdisplay_output.rc == 0

- name: Set fact that contains Free PE
  ansible.builtin.set_fact:
    free_PE: '{{ (result[0] | split)[4] }}'
  vars:
    search_string: 'Free  PE / Size'
    result: "{{ vgdisplay_output.stdout_lines | select('search', search_string) | list }}"
  when: vgdisplay_output.rc == 0

# We will use the Free PE later when we will develop the extend LVM logic
# For now, we will divide the total free space into 8 LVMS: 4 LVMS and 4 snapshots for the LVMs

- name: Debug Total PE and Free PE
  ansible.builtin.debug:
    msg:
      - "Total PE: {{ total_PE }}"
      - "Free PE: {{ free_PE }}"
  when: vgdisplay_output.rc == 0

- name: Calculate the size for one LVM (the PE approach)
  ansible.builtin.set_fact:
    lvm_size_mb: "{{ (free_PE | int * 4) // 8 }}"
  when: vgdisplay_output.rc == 0

- name: Debug LVM PE size
  ansible.builtin.debug:
    msg:
      - "The LVM size is: {{ lvm_size_mb }}"
  when: vgdisplay_output.rc == 0

- name: Create PostgreSQL LVM name list
  ansible.builtin.set_fact:
    postgresql_lvms:
      - lvm_pg_data
      - lvm_pg_wal
      - lvm_pg_logs
      - lvm_pg_backups
  when: vgdisplay_output.rc == 0

- name: Create Logical Volumes (LVMs)
  community.general.lvol:
    vg: vg_postgres
    lv: "{{ item }}"
    size: "{{ lvm_size_mb }}M"
    state: present
  loop: '{{ postgresql_lvms }}'
  when: vgdisplay_output.rc == 0

# needed checks:
# if LV exists
# if already formatted
# if already mounted

- name: Create XFS file systems on the LVMs
  ansible.builtin.command: "mkfs.xfs /dev/vg_postgres/{{ item }}"
  loop: '{{ postgresql_lvms }}'
  when: vgdisplay_output.rc == 0

# ----------------------------------------------------------- #

# -------------------- MOUNT LVM FS ------------------------- #

# DOCS:
# https://docs.ansible.com/projects/ansible/latest/collections/ansible/posix/mount_module.html

# DESCRIPTION:
# After we created the LVMs, we have to mount the File Systems
# contained by the LVMs on a specific location on the main
# File System.

- name: Create PostgreSQL dir list
  ansible.builtin.set_fact:
    postgresql_dirs:
      - /opt/postgresql/data
      - /opt/postgresql/wal
      - /opt/postgresql/logs
      - /opt/postgresql/backups

- name: Create PostgreSQL directories if it does not exist
  ansible.builtin.file:
    path: '{{ item }}'
    state: directory
    mode: '0755'
  loop: '{{ postgresql_dirs }}'

- name: Mount LVM File Systems
  ansible.posix.mount:
    path: "{{ item.1 }}"
    src: "/dev/vg_postgres/{{ item.0 }}"
    fstype: xfs
    state: mounted
  loop: "{{ postgresql_lvms | zip(postgresql_dirs) | list }}"

# ----------------------------------------------------------- #
