
# -------------------- CHECK THE STORAGE DEVICES ------------- #

# We are checking the facts that the target contains regarding
# the available storage devices.

- name: Check the storage devices
  ansible.builtin.debug:
    var: ansible_facts.devices

# ------------------------------------------------------------ #

# -------------------- CREATE LIST OF EMPTY DISKS ------------ #

# We are using set_fact module to create the empty_disks list.

- name: Create empty_disks list
  ansible.builtin.set_fact:
    empty_disks: >- 
      {{ 
        ansible_facts.devices 
        | dict2items
        | selectattr('value.partitions', 'equalto', {}) 
        | selectattr('value.model', 'equalto', "VBOX HARDDISK")
        | map(attribute='key')
        | list 
      }}

# ------------------------------------------------------------ #

# -------------------- CHECK LIST OF EMPTY DISKS ------------- #

# We are using debug module to list the contents of the
# 'empty_disks' list.

- name: List the empty_disks list
  ansible.builtin.debug:
    var: empty_disks

