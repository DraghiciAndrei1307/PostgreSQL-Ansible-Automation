---
- name: Check the storage devices
  ansible.builtin.debug:
    var: ansible_facts.devices

- name: Create empty_disks list
  ansible.builtin.set_fact:
    empty_disks: >- 
      {{ 
        ansible_facts.devices 
        | dict2items
        | selectattr('value.partitions', 'equalto', {}) 
        | selectattr('value.model', 'equalto', "VBOX HARDDISK")
        | map(attribute='key')
        | list 
      }}

- name: List the empty_disks list
  ansible.builtin.debug:
    var: empty_disks

- name: Create a new xfs primary partition
  community.general.parted:
    device: /dev/{{ item }}
    number: 1
    state: present
    fs_type: xfs
  loop: "{{ empty_disks }}"