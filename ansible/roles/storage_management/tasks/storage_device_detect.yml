# -------------------- CREATE XFS PARTITIONS FOR EACH DISK---- #

# We are using import_role module to use the create_partition
# task of the storage_management role.

- name: Create XFS partitions
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: create_partitions
  vars:
    number_of_partitions_per_disk: 2
    disk_name: "{{ item }}"
    disk_size: "{{ ansible_facts.devices[item].size }}"
  loop: "{{ empty_disks }}"
  when: empty_disks is defined and empty_disks | length > 0

# ------------------------------------------------------------ #

# We will have to update the new_partition with a list of newly_created partitions

# -------------------- CHECK THE NEW PARTITION --------------- #

# The variable new_partition is a variable resulted from the
# create_partition task file execution.

- name: Output New XFS Partitions Names
  ansible.builtin.debug:
    var: partitions_created
  when: empty_disks is defined and empty_disks | length > 0

# ------------------------------------------------------------ #

# -------------------- CREATE 'new_partition_name' FACT ------ #

# We are using the set_fact module to create a global variable
# named 'new_partition_name', based on the 'new_partition'
# variable. The 'new_partition' variable is not visible if we
# are going to use the import_role again in the future.

# Previously, we created the new_partition variable inside the
# create_partition task, using set_fact. That action will grant
# the creation of a global variable. That is why we are creating
# here a new global variable.

#- name: Create 'created_partitions' fact
#  ansible.builtin.set_fact:
