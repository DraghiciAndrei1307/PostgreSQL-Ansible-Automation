
# -------------------- CREATE XFS PARTITIONS ---------------- #

# This task creates 'number_of_partitions_per_disk' partitions
# for each 'empty' disk.

# One important thing to mention here is the use of 'loop_control'
# option. We use this option because we have nested loops and when
# we want to use the {{ item }} Jinja2 syntax, the item from the
# task below will shadow the item from the upper loop.

- name: Create XFS Primary Partitions
  community.general.parted:
    device: /dev/{{ disk_name }}
    number: "{{ part_number }}"
    flags: [lvm]
    state: present
    fs_type: xfs
    part_start: "{{ ((part_number - 1) * 100 / number_of_partitions_per_disk) | int }}%"
    part_end: "{{ (part_number * 100 / number_of_partitions_per_disk) | int }}%"
  register: create_partition_output
  loop: "{{ range(1, number_of_partitions_per_disk + 1) | list }}"
  loop_control:
    loop_var: part_number

