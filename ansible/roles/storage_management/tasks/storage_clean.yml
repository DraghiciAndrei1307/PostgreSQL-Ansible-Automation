# -------------------- REMOVE AUTO-MOUNT LINES FROM fstab --- #

- name: Remove entries from /etc/fstab
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: remove_lvm_entries_from_fstab

# ----------------------------------------------------------- #

- name: Create list with PostgreSQL dir to umount
  ansible.builtin.set_fact:
    postgresql_dirs:
      - /opt/postgresql/data
      - /opt/postgresql/wal
      - /opt/postgresql/logs
      - /opt/postgresql/backups

# ----------------------------------------------------------- #

# -------------------- UMOUNT THE LVMs FILE SYSTEMS---------- #

- name: Umount LVMs File Systems
  ansible.posix.mount:
    path: "{{ item }}"
    state: unmounted
  loop: "{{ postgresql_dirs }}"

# ----------------------------------------------------------- #

# -------------------- REMOVE POSTGRESQL FOLDERS ------------ #

- name: Remove PostgreSQL directories
  ansible.builtin.file:
    path: '{{ item }}'
    state: absent
  loop: '{{ postgresql_dirs }}'

# ----------------------------------------------------------- #

# -------------------- REMOVE LVMs -------------------------- #

- name: Remove Logical Volumes
  community.general.lvol:
    vg: vg_postgres
    lv: "{{ item }}"
    state: absent
    force: true
  loop: "{{ postgresql_lvms }}"

# ----------------------------------------------------------- #

# -------------------- REMOVE VG ---------------------------- #

- name: Remove a VG named 'vg_postgres'
  community.general.lvg:
    vg: vg_postgres
    state: absent

# ----------------------------------------------------------- #

# -------------------- REMOVE PHYSICAL VOLUMES -------------- #

- name: List of PVs to remove
  ansible.builtin.set_fact:
    pvs_to_remove:
      - sdb1
      - sdb2
      - sdc1
      - sdc2

- name: Remove physical volumes
  community.general.lvm_pv:
    device: "/dev/{{ item }}"
    state: absent
  loop: "{{ pvs_to_remove }}"

# ----------------------------------------------------------- #

# -------------------- DELETE PARTITIONS -------------------- #

- name: Delete XFS partitions
  ansible.builtin.include_role:
    name: storage_management
    tasks_from: delete_partitions
  vars:
    disk: '/dev/{{ item }}'
  loop:
    - sdb
    - sdc

# ----------------------------------------------------------- #
